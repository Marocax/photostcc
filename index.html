<html lang="pt-BR">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Arquivo de Consoles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00ff88;
  --g2:#00cc66;
  --b:#050805;
  --b2:#0b130b;
  --b3:#112211;
  --dim:#173117;
  --text:#c5ffd1;
  --soft:#ebefea;
  --soft2:#cfd5cd;
  --acc:#ffdd00;
}
body{background:#030503;margin:0}
#app{min-height:100vh;background:var(--b);color:var(--text);font-family:'Share Tech Mono',monospace;border:1px solid var(--g2);position:relative;overflow:hidden}
#scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 4px);opacity:.5}
#header{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px 18px;border-bottom:1px solid var(--g2);background:var(--b2);position:relative;z-index:1}
.hdr-label{font-family:'Orbitron',sans-serif;color:var(--g);font-size:13px;letter-spacing:.12em;text-transform:uppercase}
#hero{display:grid;grid-template-columns:minmax(360px,540px) minmax(0,1fr);gap:clamp(56px,6vw,96px);align-items:start;padding:26px 42px;border-bottom:1px solid var(--dim);position:relative;z-index:1}
#media-card{background:linear-gradient(180deg,rgba(17,34,17,.92),rgba(8,18,8,.92));border:1px solid var(--dim);padding:20px;display:flex;flex-direction:column;gap:16px;min-height:560px}
#viewer-top{display:flex;align-items:center;justify-content:space-between;gap:16px}
#viewer-kicker{font-size:12px;letter-spacing:.14em;color:var(--g2);text-transform:uppercase}
#launch-pill{font-size:11px;letter-spacing:.12em;padding:5px 10px;border:1px solid var(--acc);color:var(--acc);text-transform:uppercase}
#img-box{flex:1;min-height:390px;border:1px solid var(--g2);background:#061006;display:flex;align-items:center;justify-content:center;padding:18px;position:relative}
#img-box:before,#img-box:after{content:'';position:absolute;width:14px;height:14px}
#img-box:before{top:8px;left:8px;border-top:2px solid var(--g);border-left:2px solid var(--g)}
#img-box:after{bottom:8px;right:8px;border-bottom:2px solid var(--g);border-right:2px solid var(--g)}
#img-plate{width:100%;height:100%;background:linear-gradient(180deg,var(--soft),var(--soft2));display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden}
#img-plate img{width:100%;height:100%;object-fit:contain;display:block;transition:opacity .25s ease}
#img-plate img.fade{opacity:.18}
#year-panel{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
#year-label{font-size:12px;color:var(--g2);letter-spacing:.14em;text-transform:uppercase}
#year-big{font-family:'Orbitron',sans-serif;font-size:92px;line-height:.92;color:var(--g);text-shadow:0 0 18px rgba(0,255,136,.28)}
#year-sub{font-size:11px;color:var(--acc);letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--acc);padding:6px 10px}
#info-col{display:flex;flex-direction:column;justify-content:flex-start;gap:18px;min-width:0;padding-top:52px}
#console-name{font-family:'Orbitron',sans-serif;font-size:54px;line-height:1.05;color:#f3fff7;text-shadow:0 0 12px rgba(0,255,136,.2)}
#maker-line{font-size:22px;line-height:1.35;color:var(--g);letter-spacing:.08em}
#desc-box{font-size:27px;line-height:1.62;color:var(--text);max-width:1000px}
#badges{display:flex;flex-wrap:wrap;gap:10px}
.badge{font-size:14px;padding:6px 10px;border:1px solid var(--g2);color:var(--g);background:rgba(0,255,136,.05)}
#credit-row{padding:14px 26px 6px;font-size:12px;color:#7acb96;position:relative;z-index:1}
#credit-row a{color:#8fffb6;text-decoration:none;border-bottom:1px dotted rgba(143,255,182,.45)}
#credit-row a:hover{color:#fff}
#dots-row{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:8px;padding:16px 26px;border-top:1px solid var(--dim);border-bottom:1px solid var(--dim);background:var(--b3);position:relative;z-index:1}
.dot{width:11px;height:11px;border:1px solid var(--g2);opacity:.35;cursor:pointer;transition:all .18s ease}
.dot:hover{opacity:.75;transform:scale(1.08)}
.dot.active{opacity:1;background:var(--g);box-shadow:0 0 8px rgba(0,255,136,.6)}
#nav-section{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;padding:18px 26px;background:var(--b2);position:relative;z-index:1}
.nav-btn{justify-self:start;font-family:'Share Tech Mono',monospace;font-size:16px;letter-spacing:.1em;text-transform:uppercase;color:var(--g);background:transparent;border:1px solid var(--g2);padding:10px 18px;cursor:pointer}
#btn-next{justify-self:end}
.nav-btn:hover{background:rgba(0,255,136,.08);color:#fff}
.nav-btn:disabled{opacity:.25;cursor:default}
#nav-counter{font-family:'Orbitron',sans-serif;font-size:22px;color:var(--g);letter-spacing:.12em}
#empty-state{font-size:18px;color:#355a35;text-align:center;padding:24px}
@media (max-width:1100px){#hero{grid-template-columns:1fr;gap:24px;padding:22px}#info-col{padding-top:0}
  #console-name{font-size:40px}
  #desc-box{font-size:22px}
  #year-big{font-size:72px}
}
@media (max-width:680px){#hero{padding:16px}#header{padding:10px 12px;flex-direction:column;align-items:flex-start}
  #hero{padding:16px;gap:18px}
  #media-card{min-height:auto;padding:14px}
  #img-box{min-height:260px}
  #console-name{font-size:30px}
  #maker-line{font-size:18px}
  #desc-box{font-size:18px;line-height:1.55}
  #year-big{font-size:54px}
  #nav-section{grid-template-columns:1fr;justify-items:center}
  .nav-btn,#btn-next{justify-self:center;width:100%;max-width:240px}
  #nav-counter{order:-1}
}
</style>

let idx = 0;
function go(i) {
  const img = document.getElementById('cimg');
  img.classList.add('fade');
  setTimeout(() => {
    idx = i;
    const c = C[idx];
    img.onerror = () => {
      img.removeAttribute('src');
      img.alt = 'Imagem não encontrada';
      img.style.display = 'none';
      let old = document.getElementById('empty-state');
      if (!old) {
        old = document.createElement('div');
        old.id = 'empty-state';
        old.textContent = 'Imagem não encontrada neste nome de arquivo.';
        document.getElementById('img-plate').appendChild(old);
      }
      img.classList.remove('fade');
    };
    const old = document.getElementById('empty-state');
    if (old) old.remove();
    img.style.display = 'block';
    img.src = c.file;
    img.alt = c.n;
    img.onload = () => img.classList.remove('fade');
    document.getElementById('year-big').textContent = c.y;
    document.getElementById('year-sub').textContent = c.era;
    document.getElementById('era-tag-top').textContent = c.era;
    document.getElementById('console-name').textContent = c.n;
    document.getElementById('maker-line').textContent = '> ' + c.sub;
    document.getElementById('desc-box').textContent = c.desc;
    document.getElementById('badges').innerHTML = (c.tags || []).map(t => `<span class="badge">[${t}]</span>`).join('');
    const cr = document.getElementById('credit-text');
    cr.innerHTML = c.creditUrl
      ? `> FONTE DA IMAGEM: <a href="${c.creditUrl}" target="_blank" rel="noopener noreferrer">${c.credit}</a>`
      : `> FONTE DA IMAGEM: ${c.credit}`;
    document.getElementById('nav-counter').textContent = (idx + 1).toString().padStart(2, '0') + ' / ' + C.length.toString().padStart(2, '0');
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === C.length - 1;
    document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === idx));
  }, 120);
}
document.getElementById('dots-row').innerHTML = C.map((c, i) => `<span class="dot${i === 0 ? ' active' : ''}" onclick="go(${i})" title="${c.n} (${c.y})"></span>`).join('');
document.getElementById('btn-prev').addEventListener('click', () => { if (idx > 0) go(idx - 1); });
document.getElementById('btn-next').addEventListener('click', () => { if (idx < C.length - 1) go(idx + 1); });
go(0);
</script>
